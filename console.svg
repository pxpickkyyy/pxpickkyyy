<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <!-- Purple glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Sleek border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#2e1065" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>

  <style>
    .panel {
      fill: #030208;
      stroke: url(#border-grad);
      stroke-width: 1.5;
      rx: 10;
    }
    .header-bar {
      fill: #080612;
      stroke: #2e1065;
      stroke-width: 1;
    }
    .text-title {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #c084fc;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .text-body {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 13px;
      fill: #e8e6f4;
    }
    .text-accent {
      fill: #c084fc;
      font-weight: bold;
    }
    .text-love {
      fill: #f472b6;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(244, 114, 182, 0.4);
    }
    .status-light {
      fill: #c084fc;
      filter: drop-shadow(0 0 4px #c084fc);
    }

    /* Sound Wave ASCII Animation Frames */
    @keyframes frame1 { 0%, 20% { opacity: 1; } 20.01%, 100% { opacity: 0; } }
    @keyframes frame2 { 0%, 20% { opacity: 0; } 20.01%, 40% { opacity: 1; } 40.01%, 100% { opacity: 0; } }
    @keyframes frame3 { 0%, 40% { opacity: 0; } 40.01%, 60% { opacity: 1; } 60.01%, 100% { opacity: 0; } }
    @keyframes frame4 { 0%, 60% { opacity: 0; } 60.01%, 80% { opacity: 1; } 80.01%, 100% { opacity: 0; } }
    @keyframes frame5 { 0%, 80% { opacity: 0; } 80.01%, 100% { opacity: 1; } }

    .wave-text {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
      fill: #c084fc;
      white-space: pre;
      text-shadow: 0 0 8px rgba(192, 132, 252, 0.8);
    }

    .f1 { animation: frame1 0.6s infinite steps(1); }
    .f2 { animation: frame2 0.6s infinite steps(1); }
    .f3 { animation: frame3 0.6s infinite steps(1); }
    .f4 { animation: frame4 0.6s infinite steps(1); }
    .f5 { animation: frame5 0.6s infinite steps(1); }
  </style>

  <!-- Main Sleek Panel -->
  <rect class="panel" width="798" height="198" x="1" y="1" />
  
  <!-- Sleek Header Bar -->
  <path class="header-bar" d="M 1.5 10 A 9 9 0 0 1 10.5 1.5 L 787.5 1.5 A 9 9 0 0 1 796.5 10.5 L 796.5 28 L 1.5 28 Z" />
  
  <!-- Sleek Controls -->
  <circle class="status-light" cx="20" cy="15" r="4.5" />
  <text class="text-title" x="35" y="18">CORE DIAGNOSTICS: SYNCHRONIZED</text>
  <text class="text-title" x="780" y="18" text-anchor="end" fill="#a855f7">DK_NET v4.2</text>

  <!-- Left Column: Sleek Identity Metadata -->
  <g transform="translate(30, 60)" class="text-body">
    <text x="0" y="0"><tspan class="text-accent">&gt;</tspan> user_identity : <tspan fill="#ffffff">Pich (Peach)</tspan></text>
    <text x="0" y="26"><tspan class="text-accent">&gt;</tspan> partner_core   : <tspan class="text-love">Dhanzel Kate (DK) 💖</tspan></text>
    <text x="0" y="52"><tspan class="text-accent">&gt;</tspan> heart_status   : <tspan fill="#c084fc" font-weight="bold">Synced [100%]</tspan></text>
    <text x="0" y="78"><tspan class="text-accent">&gt;</tspan> core_focus     : <tspan fill="#ffffff">Creative Code &amp; IoT</tspan></text>
    <text x="0" y="104"><tspan class="text-accent">&gt;</tspan> system_status  : <tspan fill="#4ade80">Active &amp; Connected</tspan></text>
  </g>

  <!-- Right Column: Sleek ASCII Oscilloscope -->
  <g transform="translate(420, 50)">
    <!-- Scope Border Frame -->
    <rect width="350" height="120" rx="8" fill="#06040a" stroke="#2e1065" stroke-width="1" />
    
    <text class="text-title" x="15" y="20" font-size="9" fill="#a855f7">AUDIO_OSCILLOSCOPE.SH</text>
    <text class="text-title" x="335" y="20" font-size="9" fill="#c084fc" text-anchor="end">LIVE_WAVE</text>

    <!-- Animated Wave Area -->
    <g transform="translate(15, 60)">
      <!-- Frame 1 -->
      <text class="wave-text f1" x="0" y="0">  ▂▃▄▅▆▇██▇▆▅▄▃▂  ▂▃▄▅▆▇██▇▆▅▄▃▂</text>
      <!-- Frame 2 -->
      <text class="wave-text f2" x="0" y="0">▂▃▄▅▆▇██▇▆▅▄▃▂  ▂▃▄▅▆▇██▇▆▅▄▃▂  </text>
      <!-- Frame 3 -->
      <text class="wave-text f3" x="0" y="0">▄▅▆▇██▇▆▅▄▃▂  ▂▃▄▅▆▇██▇▆▅▄▃▂  ▂▃</text>
      <!-- Frame 4 -->
      <text class="wave-text f4" x="0" y="0">▆▇██▇▆▅▄▃▂  ▂▃▄▅▆▇██▇▆▅▄▃▂  ▂▃▄▅</text>
      <!-- Frame 5 -->
      <text class="wave-text f5" x="0" y="0">██▇▆▅▄▃▂  ▂▃▄▅▆▇██▇▆▅▄▃▂  ▂▃▄▅▆▇</text>
    </g>

    <!-- Sleek Wave Metadata -->
    <text class="text-body" x="15" y="105" font-size="10" fill="#a855f7">SYNC_FREQ: 44.1kHz</text>
    <text class="text-body" x="335" y="105" font-size="10" fill="#c084fc" text-anchor="end">SIGNAL: EXCELLENT</text>
  </g>
</svg>
