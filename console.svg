<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1d103a" stroke-width="1" stroke-opacity="0.4"/>
    </pattern>
    <!-- Cyan-Purple Progress Gradient -->
    <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <!-- Pink-Red Heart Sync Gradient -->
    <linearGradient id="pink-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <!-- Scanline Gradient -->
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0" />
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    .console-bg {
      fill: #05050a;
      stroke: #4c1d95;
      stroke-width: 2;
      rx: 12;
    }
    .bezel-bar {
      fill: #0b0914;
      stroke: #4c1d95;
      stroke-width: 1.5;
    }
    .text-title {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #a78bfa;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .text-body {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 13px;
      fill: #e2e8f0;
    }
    .text-accent {
      fill: #c084fc;
      font-weight: bold;
    }
    .text-pink {
      fill: #f472b6;
      font-weight: bold;
    }
    .metric-label {
      fill: #a78bfa;
      font-weight: bold;
    }
    
    /* Animations */
    @keyframes scan {
      0% { transform: translateY(-240px); }
      100% { transform: translateY(240px); }
    }
    .scan-line {
      animation: scan 6s infinite linear;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px #ec4899); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 8px #f43f5e); }
    }
    .heart-icon {
      transform-origin: 290px 48px;
      animation: heartbeat 1.2s infinite ease-in-out;
      fill: #ec4899;
    }

    /* Bouncing Audio Visualizer Bars */
    @keyframes bounce-1 { 0%, 100% { height: 10px; } 50% { height: 45px; } }
    @keyframes bounce-2 { 0%, 100% { height: 15px; } 50% { height: 35px; } }
    @keyframes bounce-3 { 0%, 100% { height: 8px; } 50% { height: 50px; } }
    @keyframes bounce-4 { 0%, 100% { height: 20px; } 50% { height: 40px; } }
    
    .bar { fill: #a855f7; transform-origin: bottom; }
    .b1 { animation: bounce-1 1s infinite ease-in-out; }
    .b2 { animation: bounce-2 1.4s infinite ease-in-out; }
    .b3 { animation: bounce-3 0.8s infinite ease-in-out; }
    .b4 { animation: bounce-4 1.2s infinite ease-in-out; }
  </style>

  <!-- Background Base -->
  <rect class="console-bg" width="798" height="238" x="1" y="1" />
  <rect width="796" height="236" x="2" y="2" fill="url(#grid)" rx="10" />

  <!-- Bezel Header Bar -->
  <path class="bezel-bar" d="M 2 12 A 10 10 0 0 1 12 2 L 786 2 A 10 10 0 0 1 796 12 L 796 28 L 2 28 Z" />
  
  <!-- Diagnostic Status Lights -->
  <circle cx="20" cy="15" r="4" fill="#22c55e" filter="drop-shadow(0 0 3px #22c55e)" />
  <text class="text-title" x="32" y="18">SYSTEM DIAGNOSTICS: LINKED</text>
  <text class="text-title" x="780" y="18" text-anchor="end" fill="#f472b6">DK_EDITION v4.0</text>

  <!-- Left Column: Core Telemetry -->
  <g transform="translate(25, 55)" class="text-body">
    <text x="0" y="0"><tspan class="text-accent">&gt;</tspan> user_identity: <tspan fill="#ffffff">Pich (Peach)</tspan></text>
    <text x="0" y="25"><tspan class="text-accent">&gt;</tspan> relationship: <tspan class="text-pink">Linked with Dhanzel Kate (DK) 💖</tspan></text>
    <text x="0" y="50"><tspan class="text-accent">&gt;</tspan> heart_status: <tspan fill="#4ade80">Synchronized &amp; Secure</tspan></text>
    <text x="0" y="75"><tspan class="text-accent">&gt;</tspan> primary_focus: <tspan fill="#ffffff">Creative Code &amp; Game Engines</tspan></text>
    <text x="0" y="100"><tspan class="text-accent">&gt;</tspan> location: <tspan fill="#ffffff">Thailand 🇹🇭</tspan></text>
  </g>

  <!-- Heart Icon Visualizer -->
  <path class="heart-icon" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" transform="translate(280, 35) scale(1)"/>

  <!-- Right Column: Bar Metrics -->
  <g transform="translate(420, 50)" class="text-body">
    <!-- Metric 1: Coffee -->
    <text x="0" y="10" class="metric-label">☕ COFFEE LEVEL</text>
    <rect x="0" y="18" width="340" height="12" fill="#1e1b4b" rx="6" />
    <rect x="0" y="18" width="272" height="12" fill="url(#cyan-purple)" rx="6" filter="drop-shadow(0 0 2px #a855f7)" />
    <text x="345" y="28" font-size="11" fill="#06b6d4" font-weight="bold">80%</text>

    <!-- Metric 2: Heart Sync with DK -->
    <text x="0" y="55" class="metric-label" fill="#f472b6">💖 HEART SYNC (DK)</text>
    <rect x="0" y="63" width="340" height="12" fill="#1e1b4b" rx="6" />
    <rect x="0" y="63" width="340" height="12" fill="url(#pink-red)" rx="6" filter="drop-shadow(0 0 4px #ec4899)" />
    <text x="345" y="73" font-size="11" fill="#f472b6" font-weight="bold">100%</text>

    <!-- Metric 3: Creative Drive -->
    <text x="0" y="100" class="metric-label">🧠 CREATIVE DRIVE</text>
    <rect x="0" y="108" width="340" height="12" fill="#1e1b4b" rx="6" />
    <rect x="0" y="108" width="340" height="12" fill="url(#cyan-purple)" rx="6" filter="drop-shadow(0 0 2px #a855f7)" />
    <text x="345" y="118" font-size="11" fill="#a855f7" font-weight="bold">100%</text>

    <!-- Metric 4: DK Project Status -->
    <text x="0" y="145" class="metric-label" fill="#f472b6">🛸 DK PROJECT STATUS</text>
    <rect x="0" y="153" width="340" height="12" fill="#1e1b4b" rx="6" />
    <rect x="0" y="153" width="340" height="12" fill="url(#pink-red)" rx="6" filter="drop-shadow(0 0 3px #f43f5e)" />
    <text x="345" y="163" font-size="11" fill="#f472b6" font-weight="bold">ACTIVE</text>
  </g>

  <!-- Audio Visualizer (Bouncing Neon Bars) -->
  <g transform="translate(250, 160)">
    <text x="45" y="-12" class="text-title" font-size="9" fill="#a855f7" text-anchor="middle">FREQUENCY WAVE</text>
    <rect class="bar b1" x="10" y="0" width="8" height="20" rx="3" transform="scale(1, -1) translate(0, -30)" />
    <rect class="bar b2" x="25" y="0" width="8" height="30" rx="3" transform="scale(1, -1) translate(0, -30)" />
    <rect class="bar b3" x="40" y="0" width="8" height="15" rx="3" transform="scale(1, -1) translate(0, -30)" />
    <rect class="bar b4" x="55" y="0" width="8" height="25" rx="3" transform="scale(1, -1) translate(0, -30)" />
    <rect class="bar b1" x="70" y="0" width="8" height="10" rx="3" transform="scale(1, -1) translate(0, -30)" />
  </g>

  <!-- Scanning Laser Line -->
  <rect class="scan-line" width="796" height="40" x="2" fill="url(#scanline)" pointer-events="none" />
</svg>
